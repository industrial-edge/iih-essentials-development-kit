version: '2.4'

networks:
  dataservicedevelopmentkit_default:
    name: dataservicedevelopmentkit_default
  proxy-redirect:
    name: proxy-redirect

volumes:
  db-edge-apps-dataservicedevelopmentkit-volume:


services:
  # MQTT Broker
  ie-databus:
    image: eclipse-mosquitto:1.6.10
    networks:
      - dataservicedevelopmentkit_default
    ports:
      - 11883:1883
    mem_limit: 128mb
    restart: unless-stopped

  # Services
  edgeappdataservice:
    image: siemensindustrialedge/dataservicedevelopmentkit:2.5.0
    environment:
      - EXTENDED_ERRORS=true
      - LOG_DEBUG_INFO=true
    ports:
      - 4203:4203
    networks:
      - dataservicedevelopmentkit_default
      - proxy-redirect
    volumes:
      - '/tmp/siemens/automation:/tmp/siemens/automation'
      - type: volume
        source: db-edge-apps-dataservicedevelopmentkit-volume
        target: /home/edge/filedb
    mem_limit: 128mb
    restart: unless-stopped
